<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Our Watchlist">
<meta name="theme-color" content="#f2ede6">
<title>Our Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<style>
  :root {
    --bg: #f2ede6;
    --bg2: #ebe4db;
    --card-bg: #faf8f5;
    --ink: #1a1714;
    --ink2: #6b6459;
    --ink3: #a09890;
    --accent: #c0392b;
    --border: #ddd5c8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --r: 4px;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
    backdrop-filter: blur(8px);
    gap: 8px;
  }
  .logo { font-family: var(--font-display); font-size: 1.2rem; font-style: normal; letter-spacing: -0.02em; flex-shrink: 0; }
  .header-center {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .group-code-badge {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--ink3);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s;
    user-select: all;
  }
  .group-code-badge:hover { background: var(--border); }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .user-badge {
    font-family: var(--font-mono); font-size: 0.65rem;
    color: var(--ink2); background: var(--bg2);
    border: 1px solid var(--border); padding: 4px 10px;
    border-radius: 20px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.04em; text-transform: lowercase;
  }
  .user-badge:hover { background: var(--border); }
  .add-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink); color: var(--bg); border: none;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, background 0.2s; flex-shrink: 0;
  }
  .add-btn:hover { background: var(--accent); transform: scale(1.08); }

  /* ── TABS ── */
  .tabs {
    display: flex; padding: 16px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .tab {
    font-family: var(--font-mono); font-size: 0.7rem;
    letter-spacing: 0.08em; text-transform: lowercase;
    color: var(--ink3); padding: 8px 0 12px; margin-right: 24px;
    border: none; background: none; cursor: pointer;
    position: relative; transition: color 0.2s;
  }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: ''; position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--ink);
    border-radius: 2px 2px 0 0;
  }
  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--border); color: var(--ink2);
    font-size: 0.55rem; min-width: 16px; height: 16px;
    border-radius: 8px; padding: 0 4px; margin-left: 4px;
    vertical-align: middle; font-family: var(--font-mono);
  }
  .tab.active .tab-count { background: var(--ink); color: var(--bg); }
  .tab-count--eye { background: #1a5f9e22; color: #1a5f9e; }
  .tab.active .tab-count--eye { background: var(--ink); color: var(--bg); }

  /* ── MAIN ── */
  .main { padding: 24px 16px; max-width: 1200px; margin: 0 auto; }
  @media (min-width: 600px) { .main { padding: 28px 20px; } }

  /* ── GRID ── */
  .watchlist-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (min-width: 600px) { .watchlist-grid { grid-template-columns: repeat(5, 1fr); gap: 12px; } }
  @media (min-width: 900px) { .watchlist-grid { grid-template-columns: repeat(6, 1fr); gap: 14px; } }
  @media (min-width: 1100px) { .watchlist-grid { grid-template-columns: repeat(8, 1fr); } }

  /* ── MOVIE CARD ── */
  .movie-card { cursor: pointer; animation: fadeUp 0.4s ease both; min-width: 0; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .movie-card:nth-child(1) { animation-delay: 0.05s; }
  .movie-card:nth-child(2) { animation-delay: 0.10s; }
  .movie-card:nth-child(3) { animation-delay: 0.15s; }
  .movie-card:nth-child(4) { animation-delay: 0.20s; }
  .movie-card:nth-child(5) { animation-delay: 0.25s; }
  .movie-card:nth-child(6) { animation-delay: 0.30s; }

  .poster-wrap {
    position: relative; aspect-ratio: 2/3;
    border-radius: var(--r); overflow: hidden;
    background: var(--bg2); box-shadow: var(--shadow);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
    width: 100%;
  }
  .movie-card:hover .poster-wrap { transform: translateY(-4px) scale(1.02); box-shadow: var(--shadow-lg); }
  .poster-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }

  /* card action buttons */
  .card-btn {
    position: absolute; width: 26px; height: 26px; border-radius: 50%;
    background: rgba(15,12,10,0.72); border: none; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transform: scale(0.7);
    transition: opacity 0.18s ease, transform 0.18s ease, background 0.15s;
    z-index: 10; backdrop-filter: blur(4px);
  }
  .movie-card:hover .card-btn { opacity: 1; transform: scale(1); }
  @media (hover: none) { .card-btn { opacity: 1; transform: scale(1); background: rgba(15,12,10,0.55); } }
  .card-btn:hover { transform: scale(1.1) !important; }

  .card-delete { top: 6px; right: 6px; font-size: 0.75rem; }
  .card-delete:hover { background: var(--accent) !important; }
  .card-watch { bottom: 6px; left: 6px; font-size: 0.8rem; }
  .card-watch:hover { background: #2e7d4f !important; }
  .card-eye { bottom: 6px; left: 38px; }
  .card-eye:hover { background: #1a5f9e !important; }
  .card-eye svg { width: 14px; height: 14px; }

  .card-meta { padding: 6px 2px 0; }
  .card-title {
    font-family: var(--font-body); font-size: 0.94rem; font-weight: 500;
    color: var(--ink); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; line-height: 1.3;
  }
  .card-sub { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink3); margin-top: 2px; text-transform: lowercase; }

  /* ── EMPTY STATE ── */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
  .empty-state .e-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state .e-title { font-family: var(--font-display); font-size: 1.2rem; font-style: italic; color: var(--ink2); margin-bottom: 6px; }
  .empty-state .e-sub { font-family: var(--font-mono); font-size: 0.65rem; color: var(--ink3); text-transform: lowercase; }

  /* ── LOG VIEW ── */
  .month-group { margin-bottom: 40px; animation: fadeUp 0.4s ease both; }
  .month-label { font-family: var(--font-display); font-size: 1.6rem; font-style: italic; font-weight: 400; color: var(--ink); margin-bottom: 16px; letter-spacing: -0.02em; }
  .month-label span { font-family: var(--font-mono); font-size: 0.65rem; color: var(--ink3); font-style: normal; margin-left: 10px; vertical-align: middle; letter-spacing: 0.05em; }
  .month-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (min-width: 600px) { .month-cards { grid-template-columns: repeat(5, 1fr); gap: 12px; } }
  @media (min-width: 900px) { .month-cards { grid-template-columns: repeat(6, 1fr); gap: 14px; } }
  @media (min-width: 1100px) { .month-cards { grid-template-columns: repeat(8, 1fr); } }

  /* ── OVERLAY / MODAL ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(26,23,20,0.6);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px); animation: overlayIn 0.2s ease;
  }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  @media (min-width: 600px) { .overlay { align-items: center; } }

  .modal {
    background: var(--card-bg); width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0; padding: 24px 24px 40px;
    animation: sheetUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
    max-height: 90vh; overflow-y: auto;
  }
  @media (min-width: 600px) { .modal { border-radius: 12px; max-height: 85vh; } }
  @keyframes sheetUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  @media (min-width: 600px) { .modal-handle { display: none; } }
  .modal-title { font-family: var(--font-display); font-size: 1.3rem; font-style: italic; margin-bottom: 20px; color: var(--ink); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink3); text-transform: lowercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r); padding: 10px 12px;
    font-family: var(--font-body); font-size: 0.9rem; color: var(--ink);
    outline: none; transition: border-color 0.2s; -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--ink); }
  .field textarea { resize: none; height: 72px; }

  .submit-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: var(--r); padding: 14px; font-family: var(--font-mono);
    font-size: 0.75rem; letter-spacing: 0.08em; text-transform: lowercase;
    cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.15s;
  }
  .submit-btn:hover { background: #a93226; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--ink3); cursor: not-allowed; }

  .secondary-btn {
    width: 100%; background: transparent; color: var(--ink2);
    border: 1px solid var(--border); border-radius: var(--r); padding: 12px;
    font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.06em;
    text-transform: lowercase; cursor: pointer; margin-top: 8px;
    transition: border-color 0.2s, color 0.2s;
  }
  .secondary-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* ── DETAIL MODAL ── */
  .detail-modal {
    background: var(--card-bg); width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0;
    animation: sheetUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
    overflow-y: auto; max-height: 92vh;
  }
  @media (min-width: 600px) { .detail-modal { border-radius: 12px; max-height: 88vh; } }
  .detail-poster { width: 100%; background: var(--bg2); position: relative; }
  .detail-poster img { width: 100%; height: auto; display: block; object-fit: contain; }
  .detail-body { padding: 20px 24px 32px; overflow-y: auto; }
  .detail-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 500; margin-bottom: 6px; line-height: 1.2; }
  .detail-meta { font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink3); margin-bottom: 14px; text-transform: lowercase; letter-spacing: 0.04em; }
  .detail-note { font-size: 0.85rem; color: var(--ink2); line-height: 1.6; margin-bottom: 20px; font-style: italic; }
  .detail-actions { display: flex; flex-direction: column; gap: 8px; }
  .watched-btn {
    width: 100%; background: var(--ink); color: var(--bg); border: none;
    border-radius: var(--r); padding: 14px; font-family: var(--font-mono);
    font-size: 0.72rem; letter-spacing: 0.08em; text-transform: lowercase;
    cursor: pointer; transition: background 0.2s;
  }
  .watched-btn:hover { background: var(--accent); }
  .delete-btn {
    width: 100%; background: transparent; color: var(--ink3);
    border: 1px solid var(--border); border-radius: var(--r); padding: 10px;
    font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.06em;
    text-transform: lowercase; cursor: pointer; transition: color 0.2s, border-color 0.2s;
  }
  .delete-btn:hover { color: var(--accent); border-color: var(--accent); }
  .watched-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px;
    font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink2);
    text-transform: lowercase; margin-bottom: 16px;
  }
  .watched-badge::before { content: '✓'; color: var(--accent); font-weight: bold; }
  .close-btn {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.4); color: #fff; border: none;
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }

  /* ── DATE POPUP ── */
  .date-popup {
    position: fixed; inset: 0; z-index: 300;
    display: flex; align-items: center; justify-content: center;
    background: rgba(26,23,20,0.5); backdrop-filter: blur(4px);
    animation: overlayIn 0.15s ease;
  }
  .date-popup-card {
    background: var(--card-bg); border-radius: 12px; padding: 24px;
    width: 280px; box-shadow: var(--shadow-lg);
    animation: popIn 0.2s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .date-popup-title { font-family: var(--font-display); font-size: 1rem; font-style: italic; margin-bottom: 4px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .date-popup-sub { font-family: var(--font-mono); font-size: 0.6rem; color: var(--ink3); margin-bottom: 16px; text-transform: lowercase; letter-spacing: 0.04em; }
  .date-popup input[type="date"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r); padding: 10px 12px; font-family: var(--font-body);
    font-size: 0.85rem; color: var(--ink); outline: none; margin-bottom: 12px; -webkit-appearance: none;
  }
  .date-popup-actions { display: flex; gap: 8px; }
  .date-popup-confirm {
    flex: 1; background: var(--ink); color: var(--bg); border: none;
    border-radius: var(--r); padding: 10px; font-family: var(--font-mono);
    font-size: 0.68rem; letter-spacing: 0.06em; text-transform: lowercase;
    cursor: pointer; transition: background 0.15s;
  }
  .date-popup-confirm:hover { background: #2e7d4f; }
  .date-popup-cancel {
    background: transparent; color: var(--ink3); border: 1px solid var(--border);
    border-radius: var(--r); padding: 10px 14px; font-family: var(--font-mono);
    font-size: 0.68rem; cursor: pointer; transition: color 0.15s;
  }
  .date-popup-cancel:hover { color: var(--ink); }

  /* ── LOADING / TOAST ── */
  .loading-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 9998; animation: loadBar 1.2s ease infinite; }
  @keyframes loadBar { 0% { width: 0; left: 0; } 50% { width: 70%; left: 0; } 100% { width: 0; left: 100%; } }
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--bg); padding: 10px 20px;
    border-radius: 24px; font-family: var(--font-mono); font-size: 0.68rem;
    letter-spacing: 0.04em; text-transform: lowercase; z-index: 9997;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SETUP SCREEN ── */
  .setup-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 9990;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .setup-card { max-width: 340px; width: 100%; }
  .setup-logo { font-family: var(--font-display); font-size: 2.2rem; font-style: italic; margin-bottom: 6px; text-align: center; }
  .setup-tagline { font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink3); text-align: center; margin-bottom: 36px; text-transform: lowercase; letter-spacing: 0.06em; }
  .setup-actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 0; }
  .setup-primary {
    width: 100%; background: var(--ink); color: var(--bg); border: none;
    border-radius: var(--r); padding: 14px; font-family: var(--font-mono);
    font-size: 0.75rem; letter-spacing: 0.08em; text-transform: lowercase;
    cursor: pointer; transition: background 0.2s;
  }
  .setup-primary:hover { background: var(--accent); }
  .setup-secondary {
    width: 100%; background: transparent; color: var(--ink2);
    border: 1px solid var(--border); border-radius: var(--r); padding: 13px;
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.08em;
    text-transform: lowercase; cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .setup-secondary:hover { border-color: var(--ink); color: var(--ink); }
  .setup-back {
    background: none; border: none; color: var(--ink3); font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: lowercase; cursor: pointer; padding: 8px 0;
    letter-spacing: 0.04em; display: block; margin-top: 12px;
    transition: color 0.2s;
  }
  .setup-back:hover { color: var(--ink); }
  .setup-label { font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink3); text-transform: lowercase; letter-spacing: 0.06em; margin-bottom: 8px; display: block; }
  .setup-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px; font-family: var(--font-body);
    font-size: 0.95rem; color: var(--ink); outline: none; margin-bottom: 12px;
    transition: border-color 0.2s; -webkit-appearance: none;
  }
  .setup-input:focus { border-color: var(--ink); }
  .setup-code-display {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
    padding: 16px; text-align: center; margin-bottom: 16px;
  }
  .setup-code-display .code-value {
    font-family: var(--font-mono); font-size: 1.6rem; color: var(--ink);
    letter-spacing: 0.15em; display: block; margin-bottom: 4px;
  }
  .setup-code-display .code-hint {
    font-family: var(--font-mono); font-size: 0.6rem; color: var(--ink3);
    text-transform: lowercase; letter-spacing: 0.04em;
  }
  .setup-error { font-family: var(--font-mono); font-size: 0.62rem; color: var(--accent); text-transform: lowercase; margin-bottom: 10px; display: block; min-height: 16px; }

  /* ── USER MENU ── */
  .user-menu {
    position: fixed; inset: 0; z-index: 250;
    display: flex; align-items: flex-end; justify-content: center;
    background: rgba(26,23,20,0.5); backdrop-filter: blur(4px);
    animation: overlayIn 0.15s ease;
  }
  .user-menu-card {
    background: var(--card-bg); width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0; padding: 24px 24px 40px;
    animation: sheetUp 0.25s cubic-bezier(0.34,1.2,0.64,1);
  }
  @media (min-width: 600px) {
    .user-menu { align-items: center; }
    .user-menu-card { border-radius: 12px; }
  }
  .user-menu-name { font-family: var(--font-display); font-size: 1.4rem; font-style: italic; margin-bottom: 4px; }
  .user-menu-group { font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink3); text-transform: lowercase; letter-spacing: 0.06em; margin-bottom: 20px; }
  .user-menu-members { margin-bottom: 20px; }

</style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="display:none"></div>
<div class="toast" id="toast"></div>

<div class="date-popup" id="datePopup" style="display:none">
  <div class="date-popup-card">
    <div class="date-popup-title" id="datePopupTitle"></div>
    <div class="date-popup-sub">when did you watch it?</div>
    <input type="date" id="datePopupInput">
    <div class="date-popup-actions">
      <button class="date-popup-confirm" id="datePopupConfirm">move to log ✓</button>
      <button class="date-popup-cancel" id="datePopupCancel">cancel</button>
    </div>
  </div>
</div>

<div id="app"></div>

<script>
// ─── SUPABASE ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://uxzeqtiosybttmioymlu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4emVxdGlvc3lidHRtaW95bWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDQ1ODIsImV4cCI6MjA4ODcyMDU4Mn0.9zGRwlhPfmGQQYp8Z-R2w2z2wqGH1TMH4RLe2Jy-bbI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── OMDB ────────────────────────────────────────────────────────────────────
const OMDB_KEY = '2d010114';

async function searchMovies(query, page = 1) {
  try {
    const r = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&type=movie&page=${page}&apikey=${OMDB_KEY}`);
    const d = await r.json();
    if (d.Search) return { results: d.Search, total: parseInt(d.totalResults) || 0 };
  } catch(e) {}
  return { results: [], total: 0 };
}

async function fetchPoster(title) {
  try {
    const r = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
    const d = await r.json();
    if (d.Poster && d.Poster !== 'N/A') return d.Poster;
  } catch(e) {}
  return generatePoster(title);
}

// ─── GENERATED POSTER ────────────────────────────────────────────────────────
function generatePoster(title) {
  const seed = title.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const palettes = [
    { bg1: '#0d1b2a', bg2: '#1b2838', accent: '#e8c547', text: '#f5f0e8' },
    { bg1: '#1a0a0a', bg2: '#2d1515', accent: '#e85d4a', text: '#f5ede8' },
    { bg1: '#0a1a0f', bg2: '#0f2d1a', accent: '#4ae87a', text: '#e8f5ec' },
    { bg1: '#0a0a1a', bg2: '#15152d', accent: '#8a7ae8', text: '#eee8f5' },
    { bg1: '#1a100a', bg2: '#2d1e0f', accent: '#e8a54a', text: '#f5efe8' },
    { bg1: '#0a1a1a', bg2: '#0f2d2d', accent: '#4ae8e0', text: '#e8f5f5' },
    { bg1: '#1a1a0a', bg2: '#2a2d0f', accent: '#c8e84a', text: '#f3f5e8' },
    { bg1: '#1a0a14', bg2: '#2d0f22', accent: '#e84ab4', text: '#f5e8f0' },
  ];
  const p = palettes[seed % palettes.length];
  const words = title.split(' ');
  let lines = [], current = '';
  for (const w of words) {
    if ((current + ' ' + w).trim().length > 12) { if (current) lines.push(current.trim()); current = w; }
    else current = (current + ' ' + w).trim();
  }
  if (current) lines.push(current.trim());
  const lineHeight = 38, startY = 280 - (lines.length * lineHeight) / 2;
  const shapes = [
    `<circle cx="100" cy="80" r="60" fill="${p.accent}" opacity="0.08"/>`,
    `<rect x="20" y="20" width="80" height="80" fill="${p.accent}" opacity="0.05" transform="rotate(${seed%45} 60 60)"/>`,
    `<line x1="0" y1="${100+seed%60}" x2="200" y2="${200+seed%80}" stroke="${p.accent}" stroke-width="0.5" opacity="0.3"/>`,
    `<ellipse cx="150" cy="100" rx="70" ry="40" fill="${p.accent}" opacity="0.06" transform="rotate(${seed%30})"/>`,
  ];
  const scanlines = Array.from({length:30},(_,i)=>`<line x1="0" y1="${i*20}" x2="200" y2="${i*20}" stroke="${p.accent}" stroke-width="0.3" opacity="0.06"/>`).join('');
  const textLines = lines.map((line,i)=>`<text x="100" y="${startY+i*lineHeight}" font-family="Georgia,serif" font-size="${lines.length>2?22:26}" font-weight="bold" fill="${p.text}" text-anchor="middle" letter-spacing="2">${line.toUpperCase()}</text>`).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
    <defs>
      <linearGradient id="bg${seed}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${p.bg1}"/><stop offset="100%" stop-color="${p.bg2}"/></linearGradient>
      <linearGradient id="fade${seed}" x1="0" y1="0" x2="0" y2="1"><stop offset="60%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.7)"/></linearGradient>
    </defs>
    <rect width="200" height="300" fill="url(#bg${seed})"/>
    ${scanlines}${shapes[seed%shapes.length]}
    <rect x="0" y="0" width="200" height="4" fill="${p.accent}" opacity="0.6"/>
    <rect x="0" y="296" width="200" height="4" fill="${p.accent}" opacity="0.6"/>
    <rect x="0" y="0" width="4" height="300" fill="${p.accent}" opacity="0.2"/>
    <rect x="196" y="0" width="4" height="300" fill="${p.accent}" opacity="0.2"/>
    <rect width="200" height="300" fill="url(#fade${seed})"/>
    ${textLines}
    <text x="100" y="288" font-family="monospace" font-size="7" fill="${p.accent}" text-anchor="middle" opacity="0.7" letter-spacing="3">OUR WATCHLIST</text>
  </svg>`;
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showLoading() { document.getElementById('loadingBar').style.display = 'block'; }
function hideLoading() { document.getElementById('loadingBar').style.display = 'none'; }
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  if (isNaN(date)) return '';
  return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
}
function getMonthKey(d) { const date = new Date(d); return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`; }
function formatMonthLabel(key) { const [y,m] = key.split('-'); return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('en-US',{month:'long'}).toLowerCase(); }
function groupByMonth(movies) {
  const groups = {};
  movies.forEach(m => { const k = getMonthKey(m.watched_at); if (!groups[k]) groups[k]=[]; groups[k].push(m); });
  return Object.entries(groups)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .map(([key, ms]) => [key, ms.sort((a,b) => new Date(b.watched_at) - new Date(a.watched_at))]);
}
function generateCode() {
  const words = ['FILM','REEL','CINE','FLICK','SCREEN','LENS','FRAME','SCENE'];
  const word = words[Math.floor(Math.random()*words.length)];
  const num = Math.floor(1000+Math.random()*9000);
  return `${word}-${num}`;
}

// ─── LOCAL SESSION ────────────────────────────────────────────────────────────
const SESSION_KEY = 'ourwatchlist_sessions';
const ACTIVE_KEY  = 'ourwatchlist_active';

function getAllSessions() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || []; } catch(e) { return []; } }
function getActiveIndex() { return parseInt(localStorage.getItem(ACTIVE_KEY) || '0'); }
function getSession() { const all = getAllSessions(); return all[getActiveIndex()] || null; }
function saveSession(s) {
  const all = getAllSessions();
  const idx = all.findIndex(x => x.groupId === s.groupId);
  if (idx >= 0) all[idx] = s; else all.push(s);
  localStorage.setItem(SESSION_KEY, JSON.stringify(all));
  localStorage.setItem(ACTIVE_KEY, String(all.findIndex(x => x.groupId === s.groupId)));
}
function clearSession() {
  const all = getAllSessions();
  all.splice(getActiveIndex(), 1);
  localStorage.setItem(SESSION_KEY, JSON.stringify(all));
  localStorage.setItem(ACTIVE_KEY, '0');
}
function switchToGroup(idx) { localStorage.setItem(ACTIVE_KEY, String(idx)); }

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  // session
  session: getSession(),     // { groupId, groupCode, userName }
  allSessions: getAllSessions(),
  // setup flow: 'landing' | 'create_name' | 'create_done' | 'join_code' | 'join_name'
  setupStep: 'landing',
  setupData: { code: '', name: '', groupId: null },
  setupError: '',
  // app
  movies: [],
  members: [],
  tab: 'watchlist',
  loading: true,
  showAdd: false,
  showDetail: null,
  showUserMenu: false,
  addForm: { title: '', note: '', selectedPoster: null, selectedYear: null },
  watchDate: new Date().toISOString().split('T')[0],
};

function setState(patch) { Object.assign(state, patch); render(); }

// ─── SUPABASE OPS ─────────────────────────────────────────────────────────────
async function loadMovies() {
  if (!state.session) return;
  const { data, error } = await sb.from('movies').select('*')
    .eq('group_id', state.session.groupId)
    .order('added_at', { ascending: false });
  if (!error) setState({ movies: data || [], loading: false });
  else { setState({ loading: false }); toast('could not load movies'); }
}

async function loadMembers() {
  if (!state.session) return;
  const { data } = await sb.from('members').select('*').eq('group_id', state.session.groupId);
  if (data) {
    setState({ members: data });
    // update session members cache
    saveSession({ ...state.session, members: data.map(m => m.name) });
  }
}

async function addMovie(title, note) {
  showLoading();
  let posterUrl = state.addForm.selectedPoster || null;
  if (!posterUrl) { try { posterUrl = await fetchPoster(title); } catch(e) {} }
  const { error } = await sb.from('movies').insert([{
    group_id: state.session.groupId,
    title, note: note || null,
    added_by: state.session.userName,
    poster_url: posterUrl,
    watched: false, watched_at: null, watching: false
  }]);
  hideLoading();
  if (error) { toast('error: ' + (error.message || 'insert failed')); return; }
  toast(`"${title}" added ✓`);
}

async function markWatching(id) {
  const { error } = await sb.from('movies').update({ watching: true }).eq('id', id);
  if (error) toast('error: ' + error.message);
  else toast('moved to watching 👁');
}

async function markWatched(id, watchedAt) {
  const { error } = await sb.from('movies').update({ watched: true, watched_at: watchedAt, watching: false }).eq('id', id);
  if (error) toast('error: ' + error.message);
  else toast('moved to log ✓');
}

async function deleteMovie(id) {
  const { error } = await sb.from('movies').delete().eq('id', id);
  if (error) toast('error: ' + error.message);
  else toast('removed');
}

// ─── GROUP OPS ───────────────────────────────────────────────────────────────
async function createGroup(userName) {
  let code, exists = true;
  // generate unique code
  while (exists) {
    code = generateCode();
    const { data } = await sb.from('groups').select('id').eq('code', code).maybeSingle();
    exists = !!data;
  }
  const { data: group, error: ge } = await sb.from('groups').insert([{ code }]).select().single();
  if (ge) return { error: ge.message };

  const { error: me } = await sb.from('members').insert([{ group_id: group.id, name: userName }]);
  if (me) return { error: me.message };

  return { groupId: group.id, code };
}

async function joinGroup(code, userName) {
  // find group
  const { data: group, error: ge } = await sb.from('groups').select('id').eq('code', code.toUpperCase()).maybeSingle();
  if (ge || !group) return { error: 'group not found. check your code.' };

  // get members
  const { data: members } = await sb.from('members').select('*').eq('group_id', group.id);
  const names = members ? members.map(m => m.name.toLowerCase()) : [];

  // name taken?
  if (names.includes(userName.toLowerCase())) {
    // silently rejoin — same identity
    return { groupId: group.id, rejoined: true };
  }

  // group full?
  if (members && members.length >= 4) return { error: 'this group is full (max 4 members).' };

  // join
  const { error: me } = await sb.from('members').insert([{ group_id: group.id, name: userName }]);
  if (me) return { error: me.message };

  return { groupId: group.id };
}

// ─── REALTIME ────────────────────────────────────────────────────────────────
let realtimeChannel = null;
function subscribeRealtime() {
  if (!state.session) return;
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel('group_' + state.session.groupId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'movies', filter: `group_id=eq.${state.session.groupId}` }, () => loadMovies())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'members', filter: `group_id=eq.${state.session.groupId}` }, () => loadMembers())
    .subscribe();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.session) { app.innerHTML = renderSetup(); bindSetup(); return; }
  app.innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    <div class="main">
      ${state.tab === 'watchlist' ? renderWatchlist() : state.tab === 'watching' ? renderWatching() : renderLog()}
    </div>
    ${state.showAdd ? renderAddModal() : ''}
    ${state.showDetail ? renderDetailModal() : ''}
    ${state.showUserMenu ? renderUserMenu() : ''}
  `;
  bindEvents();
}

// ─── SETUP SCREENS ───────────────────────────────────────────────────────────
function renderSetup() {
  const { setupStep: step, setupData: data, setupError: err } = state;

  const hasExistingGroups = getAllSessions().length > 0;
  if (step === 'landing') return `
    <div class="setup-screen"><div class="setup-card">
      <div class="setup-logo">Our Watchlist</div>
      <div class="setup-tagline">a shared space to track what to watch</div>
      <div class="setup-actions">
        <button class="setup-primary" id="goCreate">create a group</button>
        <button class="setup-secondary" id="goJoin">join a group</button>
        ${hasExistingGroups ? `<button class="setup-back" id="goBackToApp" style="text-align:center;margin-top:4px">← back to my groups</button>` : ''}
      </div>
    </div></div>`;

  if (step === 'create_name') return `
    <div class="setup-screen"><div class="setup-card">
      <div class="setup-logo">Our Watchlist</div>
      <div class="setup-tagline">create a new group</div>
      <span class="setup-label">your name</span>
      <input class="setup-input" id="setupName" placeholder="e.g. Aursia" value="${data.name}" autocomplete="off">
      <span class="setup-error" id="setupErr">${err}</span>
      <button class="setup-primary" id="doCreate">create group →</button>
      <button class="setup-back" id="goBack">← back</button>
    </div></div>`;

  if (step === 'create_done') return `
    <div class="setup-screen"><div class="setup-card">
      <div class="setup-logo">Our Watchlist</div>
      <div class="setup-tagline">your group is ready</div>
      <div class="setup-code-display">
        <span class="code-value">${data.code}</span>
        <span class="code-hint">share this code with your friends</span>
      </div>
      <button class="setup-primary" id="doEnter">let's go →</button>
    </div></div>`;

  if (step === 'join_code') return `
    <div class="setup-screen"><div class="setup-card">
      <div class="setup-logo">Our Watchlist</div>
      <div class="setup-tagline">join an existing group</div>
      <span class="setup-label">group code</span>
      <input class="setup-input" id="setupCode" placeholder="e.g. FILM-4829" value="${data.code}" autocomplete="off" style="text-transform:uppercase;letter-spacing:0.1em">
      <span class="setup-error" id="setupErr">${err}</span>
      <button class="setup-primary" id="doCheckCode">next →</button>
      <button class="setup-back" id="goBack">← back</button>
    </div></div>`;

  if (step === 'join_name') return `
    <div class="setup-screen"><div class="setup-card">
      <div class="setup-logo">Our Watchlist</div>
      <div class="setup-tagline">joining <span style="font-family:var(--font-mono);letter-spacing:0.08em">${data.code}</span></div>
      <span class="setup-label">your name</span>
      <input class="setup-input" id="setupName" placeholder="e.g. Aursia" value="${data.name}" autocomplete="off">
      <span class="setup-error" id="setupErr">${err}</span>
      <button class="setup-primary" id="doJoin">join group →</button>
      <button class="setup-back" id="goBack">← back</button>
    </div></div>`;
}

function bindSetup() {
  const step = state.setupStep;

  const goCreate = document.getElementById('goCreate');
  const goJoin = document.getElementById('goJoin');
  const goBack = document.getElementById('goBack');
  const doCreate = document.getElementById('doCreate');
  const doCheckCode = document.getElementById('doCheckCode');
  const doJoin = document.getElementById('doJoin');
  const doEnter = document.getElementById('doEnter');

  if (goCreate) goCreate.addEventListener('click', () => setState({ setupStep: 'create_name', setupError: '' }));
  const goBackToApp = document.getElementById('goBackToApp');
  if (goBackToApp) goBackToApp.addEventListener('click', () => {
    const sessions = getAllSessions();
    if (sessions.length > 0) {
      const s = sessions[getActiveIndex()] || sessions[0];
      setState({ session: s, allSessions: sessions });
      loadMovies(); loadMembers(); subscribeRealtime();
    }
  });
  if (goJoin) goJoin.addEventListener('click', () => setState({ setupStep: 'join_code', setupError: '' }));
  if (goBack) goBack.addEventListener('click', () => {
    const prev = step === 'create_name' ? 'landing' : step === 'join_code' ? 'landing' : step === 'join_name' ? 'join_code' : 'landing';
    setState({ setupStep: prev, setupError: '' });
  });

  // create group
  if (doCreate) {
    const nameInput = document.getElementById('setupName');
    if (nameInput) { nameInput.focus(); nameInput.addEventListener('input', e => { state.setupData.name = e.target.value; }); }
    const submit = async () => {
      const name = document.getElementById('setupName')?.value?.trim();
      if (!name) { setState({ setupError: 'please enter your name' }); return; }
      doCreate.disabled = true; doCreate.textContent = 'creating...';
      const res = await createGroup(name);
      if (res.error) { setState({ setupError: res.error }); doCreate.disabled = false; doCreate.textContent = 'create group →'; return; }
      setState({ setupStep: 'create_done', setupData: { ...state.setupData, code: res.code, groupId: res.groupId, name } });
    };
    doCreate.addEventListener('click', submit);
    if (nameInput) nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  // enter after create
  if (doEnter) {
    doEnter.addEventListener('click', () => {
      const { groupId, code, name } = state.setupData;
      const session = { groupId, groupCode: code, userName: name };
      saveSession(session);
      setState({ session, allSessions: getAllSessions(), setupStep: 'landing', setupData: { code:'', name:'', groupId: null }, loading: true });
      loadMovies(); loadMembers(); subscribeRealtime();
    });
  }

  // check code
  if (doCheckCode) {
    const codeInput = document.getElementById('setupCode');
    if (codeInput) { codeInput.focus(); codeInput.addEventListener('input', e => { state.setupData.code = e.target.value.toUpperCase(); }); }
    const submit = async () => {
      const code = document.getElementById('setupCode')?.value?.trim().toUpperCase();
      if (!code) { setState({ setupError: 'please enter a code' }); return; }
      doCheckCode.disabled = true; doCheckCode.textContent = 'checking...';
      const { data: group } = await sb.from('groups').select('id').eq('code', code).maybeSingle();
      if (!group) { setState({ setupError: 'group not found. check your code.', setupData: { ...state.setupData, code } }); doCheckCode.disabled = false; doCheckCode.textContent = 'next →'; return; }
      setState({ setupStep: 'join_name', setupData: { ...state.setupData, code, groupId: group.id }, setupError: '' });
    };
    doCheckCode.addEventListener('click', submit);
    if (codeInput) codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  // join group
  if (doJoin) {
    const nameInput = document.getElementById('setupName');
    if (nameInput) { nameInput.focus(); nameInput.addEventListener('input', e => { state.setupData.name = e.target.value; }); }
    const submit = async () => {
      const name = document.getElementById('setupName')?.value?.trim();
      if (!name) { setState({ setupError: 'please enter your name' }); return; }
      doJoin.disabled = true; doJoin.textContent = 'joining...';
      const res = await joinGroup(state.setupData.code, name);
      if (res.error) { setState({ setupError: res.error }); doJoin.disabled = false; doJoin.textContent = 'join group →'; return; }
      const session = { groupId: res.groupId, groupCode: state.setupData.code, userName: name };
      saveSession(session);
      setState({ session, allSessions: getAllSessions(), setupStep: 'landing', setupData: { code:'', name:'', groupId: null }, loading: true });
      loadMovies(); loadMembers(); subscribeRealtime();
    };
    doJoin.addEventListener('click', submit);
    if (nameInput) nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }
}

// ─── APP SCREENS ─────────────────────────────────────────────────────────────
function renderHeader() {
  return `
    <header class="header">
      <div class="logo">Our Watchlist</div>
      <div class="header-center">
        <span class="group-code-badge" id="copyCode" title="tap to copy">${state.session.groupCode}</span>
      </div>
      <div class="header-right">
        <button class="user-badge" id="openUserMenu">${state.session.userName.toLowerCase()}</button>
        <button class="add-btn" id="openAdd">+</button>
      </div>
    </header>`;
}

function renderTabs() {
  const counts = {
    watchlist: state.movies.filter(m => !m.watched && m.watching !== true).length,
    watching:  state.movies.filter(m => m.watching === true && !m.watched).length,
    log:       state.movies.filter(m => m.watched).length,
  };
  return `
    <div class="tabs">
      <button class="tab ${state.tab==='watchlist'?'active':''}" data-tab="watchlist">watchlist${counts.watchlist ? ` <span class="tab-count">${counts.watchlist}</span>` : ''}</button>
      <button class="tab ${state.tab==='watching'?'active':''}" data-tab="watching">watching${counts.watching ? ` <span class="tab-count tab-count--eye">${counts.watching}</span>` : ''}</button>
      <button class="tab ${state.tab==='log'?'active':''}" data-tab="log">log${counts.log ? ` <span class="tab-count">${counts.log}</span>` : ''}</button>
    </div>`;
}

function renderWatchlist() {
  const movies = state.movies.filter(m => !m.watched && m.watching !== true);
  if (state.loading) return `<div class="watchlist-grid"><div class="empty-state"><div class="e-icon">⏳</div><div class="e-title">loading...</div></div></div>`;
  if (!movies.length) return `<div class="watchlist-grid"><div class="empty-state"><div class="e-icon">🎬</div><div class="e-title">nothing to watch yet</div><div class="e-sub">tap + to add a movie</div></div></div>`;
  return `<div class="watchlist-grid">${movies.map(renderCard).join('')}</div>`;
}

function renderWatching() {
  const movies = state.movies.filter(m => m.watching === true && !m.watched);
  if (!movies.length) return `<div class="watchlist-grid"><div class="empty-state"><div class="e-icon">👁</div><div class="e-title">nothing currently watching</div><div class="e-sub">tap the eye icon on a card to mark as watching</div></div></div>`;
  return `<div class="watchlist-grid">${movies.map(renderCard).join('')}</div>`;
}

function renderLog() {
  const movies = state.movies.filter(m => m.watched && m.watched_at);
  if (!movies.length) return `<div class="log-view"><div class="empty-state"><div class="e-icon">📅</div><div class="e-title">no movies watched yet</div><div class="e-sub">mark a movie as watched to see it here</div></div></div>`;
  const groups = groupByMonth(movies);
  return `<div class="log-view">${groups.map(([key, ms]) => `
    <div class="month-group">
      <div class="month-label">${formatMonthLabel(key)} <span>${key.split('-')[0]}</span></div>
      <div class="month-cards">${ms.map(renderCard).join('')}</div>
    </div>`).join('')}</div>`;
}

function renderCard(movie) {
  const posterSrc = movie.poster_url || generatePoster(movie.title);
  const safeTitle = movie.title.replace(/"/g, '&quot;');
  const isOwner = movie.added_by === state.session.userName;
  const sub = movie.watched
    ? formatDate(movie.watched_at)
    : movie.watching === true
    ? `watching · ${(movie.added_by||'').toLowerCase()}`
    : (movie.added_by||'').toLowerCase();

  const deleteBtn = isOwner ? `<button class="card-btn card-delete" data-delete-id="${movie.id}" title="remove">✕</button>` : '';
  const watchBtn = !movie.watched ? `<button class="card-btn card-watch" data-watch-id="${movie.id}" data-watch-title="${safeTitle}" title="move to log">✓</button>` : '';
  const eyeBtn = !movie.watched && movie.watching !== true ? `<button class="card-btn card-eye" data-eye-id="${movie.id}" title="mark watching"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>` : '';

  return `
    <div class="movie-card" data-id="${movie.id}">
      <div class="poster-wrap">
        <img src="${posterSrc}" alt="${safeTitle}" loading="lazy" data-title="${safeTitle}" onerror="this.onerror=null;this.src=generatePoster(this.dataset.title)">
        ${deleteBtn}${watchBtn}${eyeBtn}
      </div>
      <div class="card-meta">
        <div class="card-title">${movie.title}</div>
        <div class="card-sub">${sub}</div>
      </div>
    </div>`;
}

function renderAddModal() {
  const f = state.addForm;
  return `
    <div class="overlay" id="overlay">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">add a movie</div>
        <div class="field" style="position:relative">
          <label>title</label>
          <input type="text" id="addTitle" placeholder="search for a movie..." value="${f.title}" autocomplete="off">
          <div id="searchResults" style="position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--card-bg);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);max-height:240px;overflow-y:auto;display:none"></div>
        </div>
        ${f.selectedYear ? `<div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--ink3);margin:-8px 0 12px;padding-left:2px">${f.selectedYear} · matched from omdb</div>` : ''}
        <div class="field">
          <label>note <span style="color:var(--ink3);font-size:0.58rem">(optional)</span></label>
          <textarea id="addNote" placeholder="e.g. Sofia recommended this...">${f.note}</textarea>
        </div>
        <button class="submit-btn" id="submitAdd">add to watchlist</button>
      </div>
    </div>`;
}

function renderDetailModal() {
  const m = state.showDetail;
  const posterSrc = m.poster_url || generatePoster(m.title);
  const isOwner = m.added_by === state.session.userName;

  const actions = m.watched ? `
    <div class="detail-actions">
      <div class="field" style="margin-bottom:10px">
        <label>watched on</label>
        <input type="date" id="watchDateInput" value="${m.watched_at}">
      </div>
      <button class="watched-btn" id="doUpdateDate">update date</button>
      ${isOwner ? `<button class="delete-btn" id="doDelete">remove from log</button>` : ''}
    </div>` : `
    <div class="detail-actions">
      <div class="field" style="margin-bottom:10px">
        <label>watched on</label>
        <input type="date" id="watchDateInput" value="${state.watchDate}">
      </div>
      <button class="watched-btn" id="doWatched">move to log ✓</button>
      ${isOwner ? `<button class="delete-btn" id="doDelete">delete movie</button>` : ''}
    </div>`;

  return `
    <div class="overlay" id="overlay">
      <div class="detail-modal">
        <div class="detail-poster" style="position:relative">
          <img src="${posterSrc}" data-title="${m.title.replace(/"/g,'&quot;')}" onerror="this.onerror=null;this.src=generatePoster(this.dataset.title)">
          <button class="close-btn" id="closeDetail">✕</button>
        </div>
        <div class="detail-body">
          <div class="detail-title">${m.title}</div>
          <div class="detail-meta">added by ${(m.added_by||'').toLowerCase()} · ${formatDate(m.added_at)}</div>
          ${m.note ? `<div class="detail-note">"${m.note}"</div>` : ''}
          ${actions}
        </div>
      </div>
    </div>`;
}

function renderUserMenu() {
  const members = state.members;
  const memberPills = members.length
    ? members.map(m => `<span class="member-pill ${m.name===state.session.userName?'me':''}">${m.name.toLowerCase()}</span>`).join('')
    : `<span class="member-pill">${state.session.userName.toLowerCase()}</span>`;

  const allSessions = getAllSessions();
  const activeIdx = getActiveIndex();
  const groupSwitcher = allSessions.length > 1 ? `
    <div class="user-menu-members" style="margin-bottom:16px">
      <div class="user-menu-members-title">your groups</div>
      ${allSessions.map((s, i) => `
        <span class="member-pill ${i === activeIdx ? 'me' : ''}" style="cursor:pointer" data-switch-idx="${i}">
          ${s.groupCode}
        </span>`).join('')}
    </div>` : '';

  return `
    <div class="user-menu" id="userMenuOverlay">
      <div class="user-menu-card">
        <div class="user-menu-name">${state.session.userName}</div>
        <div class="user-menu-group">group code: ${state.session.groupCode}</div>
        ${groupSwitcher}
        <div class="user-menu-members">
          <div class="user-menu-members-title">members in this group</div>
          ${memberPills}
        </div>
        <button class="secondary-btn" id="doAddGroup" style="margin-bottom:8px">+ join or create another group</button>
        <button class="leave-btn" id="doLeave">leave this group</button>
      </div>
    </div>`;
}

// ─── BIND EVENTS ─────────────────────────────────────────────────────────────
function bindEvents() {
  // tabs
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setState({ tab: t.dataset.tab })));

  // header
  const addBtn = document.getElementById('openAdd');
  if (addBtn) addBtn.addEventListener('click', () => setState({ showAdd: true, addForm: { title: '', note: '', selectedPoster: null, selectedYear: null } }));

  const userMenuBtn = document.getElementById('openUserMenu');
  if (userMenuBtn) userMenuBtn.addEventListener('click', () => setState({ showUserMenu: true }));

  const copyCode = document.getElementById('copyCode');
  if (copyCode) copyCode.addEventListener('click', () => {
    navigator.clipboard?.writeText(state.session.groupCode).then(() => toast('code copied!')).catch(() => toast(state.session.groupCode));
  });

  // overlay close
  const overlay = document.getElementById('overlay');
  if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) setState({ showAdd: false, showDetail: null }); });

  // user menu
  const userMenuOverlay = document.getElementById('userMenuOverlay');
  if (userMenuOverlay) userMenuOverlay.addEventListener('click', e => { if (e.target === userMenuOverlay) setState({ showUserMenu: false }); });
  const doLeave = document.getElementById('doLeave');
  if (doLeave) doLeave.addEventListener('click', () => {
    if (!confirm('leave this group? you can rejoin anytime with the same code and name.')) return;
    clearSession();
    const nextSession = getSession();
    setState({ session: nextSession, allSessions: getAllSessions(), movies: [], members: [], showUserMenu: false, loading: true, setupStep: 'landing', tab: 'watchlist' });
    if (realtimeChannel) sb.removeChannel(realtimeChannel);
    if (nextSession) { loadMovies(); loadMembers(); subscribeRealtime(); }
  });

  const doAddGroup = document.getElementById('doAddGroup');
  if (doAddGroup) doAddGroup.addEventListener('click', () => {
    setState({ showUserMenu: false, session: null, setupStep: 'landing', setupError: '' });
  });

  document.querySelectorAll('[data-switch-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.switchIdx);
      if (idx === getActiveIndex()) { setState({ showUserMenu: false }); return; }
      switchToGroup(idx);
      const newSession = getAllSessions()[idx];
      if (realtimeChannel) sb.removeChannel(realtimeChannel);
      setState({ session: newSession, allSessions: getAllSessions(), showUserMenu: false, movies: [], members: [], loading: true, tab: 'watchlist' });
      loadMovies(); loadMembers(); subscribeRealtime();
    });
  });

  // add modal
  if (state.showAdd) {
    const titleInput = document.getElementById('addTitle');
    const noteInput = document.getElementById('addNote');
    if (noteInput) noteInput.addEventListener('input', e => { state.addForm.note = e.target.value; });

    if (titleInput) {
      titleInput.focus();
      let searchTimer = null;
      titleInput.addEventListener('input', e => {
        state.addForm.title = e.target.value;
        state.addForm.selectedYear = null;
        state.addForm.selectedPoster = null;
        clearTimeout(searchTimer);
        const q = e.target.value.trim();
        const resultsEl = document.getElementById('searchResults');
        if (q.length < 2) { resultsEl.style.display = 'none'; return; }
        searchTimer = setTimeout(async () => {
          let currentPage = 1;
          let allResults = [];

          async function loadAndRender(page) {
            const { results, total } = await searchMovies(q, page);
            if (!results.length && page === 1) { resultsEl.style.display = 'none'; return; }
            allResults = page === 1 ? results : [...allResults, ...results];
            const hasMore = allResults.length < total;
            resultsEl.style.display = 'block';

            const itemsHTML = allResults.map(r => `
              <div class="search-result-item" data-title="${r.Title.replace(/"/g,'&quot;')}" data-year="${r.Year}" data-poster="${r.Poster !== 'N/A' ? r.Poster : ''}">
                <img src="${r.Poster !== 'N/A' ? r.Poster : ''}" onerror="this.style.display='none'" style="width:32px;height:46px;object-fit:cover;border-radius:2px;flex-shrink:0;background:var(--bg2)">
                <div><div style="font-family:var(--font-body);font-size:0.82rem;color:var(--ink)">${r.Title}</div><div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--ink3)">${r.Year}</div></div>
              </div>`).join('');

            const noneHTML = `
              <div class="search-result-item" data-title="${titleInput.value.trim().replace(/"/g,'&quot;')}" data-year="" data-poster="">
                <div style="width:32px;height:46px;border-radius:2px;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1rem">🎬</div>
                <div><div style="font-family:var(--font-body);font-size:0.82rem;color:var(--ink)">none of these</div><div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--ink3)">use generated poster</div></div>
              </div>`;

            const seeMoreHTML = hasMore ? `
              <div id="seeMoreBtn" style="padding:10px 12px;text-align:center;cursor:pointer;font-family:var(--font-mono);font-size:0.65rem;color:var(--ink3);letter-spacing:0.04em;border-top:1px solid var(--border)">
                see more (${total - allResults.length} more)
              </div>` : '';

            resultsEl.innerHTML = itemsHTML + noneHTML + seeMoreHTML;

            resultsEl.querySelectorAll('.search-result-item').forEach(item => {
              Object.assign(item.style, { display:'flex', gap:'10px', alignItems:'center', padding:'8px 12px', cursor:'pointer', borderBottom:'1px solid var(--border)' });
              item.addEventListener('mouseenter', () => item.style.background = 'var(--bg2)');
              item.addEventListener('mouseleave', () => item.style.background = '');
              item.addEventListener('click', () => {
                state.addForm.title = item.dataset.title;
                state.addForm.selectedYear = item.dataset.year;
                state.addForm.selectedPoster = item.dataset.poster || null;
                titleInput.value = item.dataset.title;
                resultsEl.style.display = 'none';
                render();
              });
            });

            const seeMoreBtn = document.getElementById('seeMoreBtn');
            if (seeMoreBtn) seeMoreBtn.addEventListener('click', async () => {
              seeMoreBtn.textContent = 'loading...';
              currentPage++;
              await loadAndRender(currentPage);
            });
          }

          await loadAndRender(currentPage);
        }, 350);
      });
      titleInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); doSubmitAdd(); }
        if (e.key === 'Escape') document.getElementById('searchResults').style.display = 'none';
      });
    }

    const submitBtn = document.getElementById('submitAdd');
    async function doSubmitAdd() {
      const title = document.getElementById('addTitle')?.value?.trim();
      const note = document.getElementById('addNote')?.value?.trim();
      if (!title) { toast('please enter a title'); return; }
      const dup = state.movies.find(m => m.title.toLowerCase() === title.toLowerCase());
      if (dup) { toast(`"${title}" is ${dup.watched ? 'already in your log' : 'already on the watchlist'}`); return; }
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'adding...'; }
      await addMovie(title, note);
      setState({ showAdd: false });
    }
    if (submitBtn) submitBtn.addEventListener('click', doSubmitAdd);
  }

  // detail modal
  if (state.showDetail) {
    const closeBtn = document.getElementById('closeDetail');
    if (closeBtn) closeBtn.addEventListener('click', () => setState({ showDetail: null }));

    const watchedBtn = document.getElementById('doWatched');
    if (watchedBtn) watchedBtn.addEventListener('click', async () => {
      const date = document.getElementById('watchDateInput')?.value || state.watchDate;
      watchedBtn.disabled = true;
      await markWatched(state.showDetail.id, date);
      setState({ showDetail: null });
    });

    const dateInput = document.getElementById('watchDateInput');
    if (dateInput) dateInput.addEventListener('change', e => { state.watchDate = e.target.value; });

    const updateDateBtn = document.getElementById('doUpdateDate');
    if (updateDateBtn) updateDateBtn.addEventListener('click', async () => {
      const date = document.getElementById('watchDateInput')?.value;
      if (!date) { toast('please pick a date'); return; }
      updateDateBtn.disabled = true; updateDateBtn.textContent = 'saving...';
      const { error } = await sb.from('movies').update({ watched_at: date }).eq('id', state.showDetail.id);
      if (error) { toast('error: ' + error.message); updateDateBtn.disabled = false; updateDateBtn.textContent = 'update date'; }
      else { toast('date updated ✓'); setState({ showDetail: null }); }
    });

    const deleteBtn = document.getElementById('doDelete');
    if (deleteBtn) deleteBtn.addEventListener('click', async () => {
      if (!confirm(state.showDetail.watched ? 'remove from log?' : 'delete this movie?')) return;
      deleteBtn.disabled = true; deleteBtn.textContent = 'deleting...';
      await deleteMovie(state.showDetail.id);
      setState({ showDetail: null });
    });
  }

  // date popup
  let pendingWatchId = null;
  const datePopup = document.getElementById('datePopup');
  const datePopupInput = document.getElementById('datePopupInput');
  const datePopupConfirm = document.getElementById('datePopupConfirm');
  const datePopupCancel = document.getElementById('datePopupCancel');

  function openDatePopup(id, title) {
    pendingWatchId = id;
    document.getElementById('datePopupTitle').textContent = title;
    datePopupInput.value = new Date().toISOString().split('T')[0];
    datePopup.style.display = 'flex';
    setTimeout(() => datePopupInput.focus(), 100);
  }
  function closeDatePopup() { datePopup.style.display = 'none'; pendingWatchId = null; }

  if (datePopupConfirm) datePopupConfirm.addEventListener('click', async () => {
    if (!pendingWatchId) return;
    datePopupConfirm.disabled = true; datePopupConfirm.textContent = 'moving...';
    await markWatched(pendingWatchId, datePopupInput.value || new Date().toISOString().split('T')[0]);
    closeDatePopup();
    datePopupConfirm.disabled = false; datePopupConfirm.textContent = 'move to log ✓';
  });
  if (datePopupCancel) datePopupCancel.addEventListener('click', closeDatePopup);
  if (datePopup) datePopup.addEventListener('click', e => { if (e.target === datePopup) closeDatePopup(); });
  if (datePopupInput) datePopupInput.addEventListener('keydown', e => { if (e.key === 'Enter') datePopupConfirm.click(); });

  // card buttons
  document.querySelectorAll('.card-eye').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    btn.style.opacity = '0.4';
    await markWatching(btn.dataset.eyeId);
    setState({ tab: 'watching' });
  }));

  document.querySelectorAll('.card-watch').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    openDatePopup(btn.dataset.watchId, btn.dataset.watchTitle);
  }));

  document.querySelectorAll('.card-delete').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const movie = state.movies.find(m => m.id === btn.dataset.deleteId);
    if (!movie) return;
    if (!confirm(`delete "${movie.title}"?`)) return;
    btn.textContent = '…';
    await deleteMovie(btn.dataset.deleteId);
  }));

  document.querySelectorAll('.movie-card').forEach(card => card.addEventListener('click', () => {
    const movie = state.movies.find(m => m.id === card.dataset.id);
    if (movie) setState({ showDetail: movie });
  }));
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  render();
  if (state.session) { await loadMovies(); await loadMembers(); subscribeRealtime(); }
}

init();
</script>
